<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Download Service</title>
    <style>
        :root {
            --bg: #f8f9fc;
            --surface: #ffffff;
            --surface-hover: #f1f3f8;
            --line: #e2e6ef;
            --text: #1a1d26;
            --text-soft: #5c6377;
            --text-faint: #939aa8;
            --accent: #4f6ef7;
            --accent-hover: #3b5bdb;
            --accent-soft: rgba(79, 110, 247, 0.08);
            --success: #2ea044;
            --danger: #cf222e;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius: 12px;
            --radius-lg: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.5;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        .header {
            margin-bottom: 32px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .header p {
            color: var(--text-soft);
            font-size: 14px;
        }

        .header-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 10px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .header-link:hover {
            background: rgba(79, 110, 247, 0.14);
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            overflow-x: auto;
        }

        .tab {
            flex: 1;
            min-width: 140px;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--text-soft);
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(79, 110, 247, 0.3);
        }

        .tab-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            margin-left: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }

        .tab:not(.active) .tab-badge {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .panel {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--line);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 700;
        }

        .upload-area {
            padding: 24px;
            border-bottom: 1px solid var(--line);
        }

        .dropzone {
            border: 2px dashed var(--line);
            border-radius: var(--radius);
            padding: 32px;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .dropzone-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .dropzone h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .dropzone p {
            font-size: 13px;
            color: var(--text-faint);
        }

        .file-input {
            display: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            margin-top: 16px;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 14px 24px;
            background: var(--bg);
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: left;
            white-space: nowrap;
        }

        tbody td {
            padding: 16px 24px;
            border-top: 1px solid var(--line);
            vertical-align: middle;
        }

        tbody tr:hover {
            background: var(--surface-hover);
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .file-name {
            font-weight: 600;
            word-break: break-all;
        }

        .file-version {
            font-size: 12px;
            color: var(--text-faint);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: var(--bg);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-soft);
        }

        .size {
            color: var(--text-soft);
            font-size: 14px;
            white-space: nowrap;
        }

        .date {
            color: var(--text-soft);
            font-size: 14px;
            white-space: nowrap;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-ghost {
            padding: 8px 12px;
            background: var(--bg);
            color: var(--text);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-ghost:hover {
            background: var(--line);
        }

        .btn-ghost.danger {
            background: rgba(207, 34, 46, 0.08);
            color: var(--danger);
        }

        .btn-ghost.danger:hover {
            background: rgba(207, 34, 46, 0.15);
        }

        .empty-state,
        .loading-state {
            padding: 64px 24px;
            text-align: center;
            color: var(--text-faint);
        }

        .loading-state::before {
            content: "";
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--line);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
            max-width: 360px;
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--danger);
        }

        .toast-info {
            border-left: 4px solid var(--accent);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .page {
                padding: 20px 16px 48px;
            }

            .tabs {
                gap: 2px;
                padding: 3px;
            }

            .tab {
                min-width: 100px;
                padding: 10px 14px;
                font-size: 13px;
            }

            .panel-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            thead th,
            tbody td {
                padding: 12px 16px;
            }

            .hide-mobile {
                display: none;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="header">
            <div>
                <h1>二进制文件管理台</h1>
                <p>管理并分发 node_exporter、node-push-exporter 及安装/卸载脚本</p>
            </div>
            <div style="display:flex; gap:12px">
                <a class="header-link" href="/agents">查看节点状态</a>
            </div>
        </header>

        <div class="tabs" id="tabs" role="tablist"></div>

        <div class="toast-container" id="toast-container"></div>

        <div id="content"></div>
    </main>

    <script>
        const API_BASE = "";
        const PROGRAMS = [
            { id: "node_exporter", name: "node_exporter", abbr: "NE", desc: "Prometheus 节点监控导出器" },
            { id: "node-push-exporter", name: "node-push-exporter", abbr: "NP", desc: "Node 指标推送服务" },
            { id: "install-script", name: "安装/卸载脚本", abbr: "IS", desc: "自动化安装和卸载脚本" }
        ];

        const state = {
            files: [],
            loading: false,
            activeTab: "node_exporter"
        };
        let contentClickHandlerBound = false;

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, (char) => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
            }[char]));
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + " B";
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + " MB";
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
        }

        function formatDate(value) {
            return new Date(value).toLocaleString("zh-CN", {
                year: "numeric", month: "2-digit", day: "2-digit",
                hour: "2-digit", minute: "2-digit"
            });
        }

        function showToast(message, type = "info", timeout = 3500) {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${escapeHtml(message)}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), timeout);
        }

        function getProgramFiles(program) {
            return state.files.filter((file) => file.program === program);
        }

        function renderTabs() {
            const tabs = document.getElementById("tabs");
            tabs.innerHTML = PROGRAMS.map(p => {
                const count = getProgramFiles(p.id).length;
                const isActive = state.activeTab === p.id;
                return `
                    <button class="tab ${isActive ? 'active' : ''}" 
                            data-program="${p.id}" 
                            role="tab"
                            aria-selected="${isActive}">
                        ${p.abbr}<span class="tab-badge">${count}</span>
                    </button>
                `;
            }).join("");

            tabs.querySelectorAll(".tab").forEach(tab => {
                tab.addEventListener("click", () => {
                    state.activeTab = tab.dataset.program;
                    renderTabs();
                    renderContent();
                });
            });
        }

        function renderContent() {
            const content = document.getElementById("content");
            const program = PROGRAMS.find(p => p.id === state.activeTab);
            const files = getProgramFiles(state.activeTab);

            content.innerHTML = `
                <div class="panel">
                    <div class="panel-header">
                        <h2 class="panel-title">${program.name}</h2>
                        <span style="color: var(--text-faint); font-size: 14px;">${program.desc}</span>
                    </div>
                    <div class="upload-area">
                        <div class="dropzone" id="dropzone" data-program="${state.activeTab}">
                            <input type="file" id="file-input" class="file-input" data-program="${state.activeTab}">
                            <div class="dropzone-icon">📁</div>
                            <h3>拖拽文件到此处或点击选择</h3>
                            <p>支持任意格式文件，install.sh/uninstall.sh 将归类到安装脚本</p>
                            <button class="btn btn-primary" id="select-btn">选择文件</button>
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>文件</th>
                                    <th>平台</th>
                                    <th>大小</th>
                                    <th class="hide-mobile">上传时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="file-list">
                                ${renderTableBody(files)}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            setupUploadHandlers();
        }

        function renderTableBody(files) {
            if (state.loading && state.files.length === 0) {
                return '<tr><td colspan="5" class="loading-state">正在加载文件列表...</td></tr>';
            }
            if (files.length === 0) {
                return '<tr><td colspan="5" class="empty-state"><div class="empty-state-icon">📭</div><h3>还没有文件</h3><p>拖拽二进制文件到上方区域即可上传</p></td></tr>';
            }
            return files.map(file => `
                <tr>
                    <td>
                        <div class="file-info">
                            <span class="file-name">${escapeHtml(file.filename)}</span>
                            <span class="file-version">版本 ${escapeHtml(file.version || '未知')}</span>
                        </div>
                    </td>
                    <td><span class="tag">${escapeHtml(file.os || 'any')}-${escapeHtml(file.arch || 'any')}</span></td>
                    <td class="size">${formatSize(file.file_size)}</td>
                    <td class="date hide-mobile">${formatDate(file.uploaded_at)}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-ghost" data-copy="${escapeHtml(file.filename)}">复制链接</button>
                            <a class="btn-ghost" href="/download/${encodeURIComponent(file.filename)}" download>下载</a>
                            <button class="btn-ghost danger" data-delete-id="${file.id}" data-delete-name="${escapeHtml(file.filename)}">删除</button>
                        </div>
                    </td>
                </tr>
            `).join("");
        }

        function setupUploadHandlers() {
            const dropzone = document.getElementById("dropzone");
            const fileInput = document.getElementById("file-input");
            const selectBtn = document.getElementById("select-btn");
            const content = document.getElementById("content");

            selectBtn?.addEventListener("click", () => fileInput.click());

            fileInput?.addEventListener("change", async (e) => {
                const [file] = e.target.files;
                if (file) await uploadFile(file, state.activeTab);
                e.target.value = "";
            });

            dropzone?.addEventListener("click", () => fileInput.click());

            ["dragenter", "dragover"].forEach(evt => {
                dropzone?.addEventListener(evt, (e) => {
                    e.preventDefault();
                    dropzone.classList.add("dragover");
                });
            });

            ["dragleave", "drop"].forEach(evt => {
                dropzone?.addEventListener(evt, (e) => {
                    e.preventDefault();
                    dropzone.classList.remove("dragover");
                });
            });

            dropzone?.addEventListener("drop", async (e) => {
                const [file] = e.dataTransfer.files;
                if (file) await uploadFile(file, state.activeTab);
            });

            if (!contentClickHandlerBound && content) {
                content.addEventListener("click", async (e) => {
                    const copyBtn = e.target.closest("[data-copy]");
                    if (copyBtn) {
                        await copyLink(copyBtn.dataset.copy);
                    }

                    const deleteBtn = e.target.closest("[data-delete-id]");
                    if (deleteBtn) {
                        await deleteFile(deleteBtn.dataset.deleteId, deleteBtn.dataset.deleteName);
                    }
                });
                contentClickHandlerBound = true;
            }
        }

        async function copyLink(filename) {
            const url = `${window.location.origin}/download/${encodeURIComponent(filename)}`;
            const curlCmd = `curl -fsSL ${url} | sudo bash`;
            try {
                await navigator.clipboard.writeText(curlCmd);
                showToast("复制成功（curl 命令）", "success");
            } catch {
                // 降级方案：用于 HTTP 环境
                const textarea = document.createElement("textarea");
                textarea.value = curlCmd;
                textarea.style.position = "fixed";
                textarea.style.opacity = "0";
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand("copy");
                    showToast("复制成功（curl 命令）", "success");
                } catch {
                    showToast("复制失败，请手动复制", "error");
                }
                document.body.removeChild(textarea);
            }
        }

        async function uploadFile(file, program) {

            const formData = new FormData();
            formData.append("file", file);

            try {
                showToast(`正在上传 ${file.name}...`, "info", 2000);
                const response = await fetch(`${API_BASE}/api/upload`, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({ detail: "未知错误" }));
                    throw new Error(err.detail || "上传失败");
                }

                showToast(`上传成功: ${file.name}`, "success");
                await loadFiles();
            } catch (error) {
                showToast(`上传失败: ${error.message}`, "error");
            }
        }

        async function deleteFile(id, filename) {
            if (!confirm(`确定要删除 ${filename} 吗？`)) return;

            try {
                const response = await fetch(`${API_BASE}/api/files/${id}`, {
                    method: "DELETE"
                });
                if (!response.ok) {
                    const err = await response.json().catch(() => ({ detail: "未知错误" }));
                    throw new Error(err.detail || "删除失败");
                }
                showToast(`已删除 ${filename}`, "success");
                await loadFiles();
            } catch (error) {
                showToast(`删除失败: ${error.message}`, "error");
            }
        }

        async function loadFiles() {
            state.loading = true;
            try {
                const response = await fetch(`${API_BASE}/api/files`);
                if (!response.ok) throw new Error("文件列表加载失败");
                const data = await response.json();
                state.files = data.files || [];
            } catch (error) {
                showToast(error.message || "加载失败", "error");
            } finally {
                state.loading = false;
                renderTabs();
                renderContent();
            }
        }

        loadFiles();
    </script>
</body>
</html>
