<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版本管理</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 48px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 700;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            padding: 20px;
        }
        .panel h2 {
            margin-top: 0;
        }
        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 12px;
        }
        .field input, .field textarea, .field button {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }
        .field textarea {
            min-height: 180px;
            resize: vertical;
        }
        .field button {
            border: none;
            background: #2563eb;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
        }
        th {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
        }
        .muted {
            color: #6b7280;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <div>
            <h1>版本管理</h1>
            <p>只记录和展示可选二进制版本与配置模板。</p>
        </div>
        <div>
            <a href="/agents">节点更新</a>
            <span style="display:inline-block;width:12px"></span>
            <a href="/">文件管理</a>
        </div>
    </div>

    <div class="grid">
        <div class="panel">
            <h2>二进制版本</h2>
            <div class="muted" style="margin-bottom:12px">来自已上传的 node-push-exporter 文件。</div>
            <table>
                <thead>
                    <tr>
                        <th>版本</th>
                        <th>平台</th>
                        <th>文件名</th>
                    </tr>
                </thead>
                <tbody id="binary-versions">
                    <tr><td colspan="3">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="panel">
            <h2>配置模板</h2>
            <div class="field">
                <input id="template-name" placeholder="模板名，例如 prod-a">
            </div>
            <div class="field">
                <input id="template-version" placeholder="版本号，例如 2026-04-09">
            </div>
            <div class="field">
                <input id="template-notes" placeholder="备注，可选">
            </div>
            <div class="field">
                <textarea id="template-content" placeholder="完整 key=value 配置内容"></textarea>
            </div>
            <div class="field">
                <button id="save-template">保存配置模板</button>
            </div>
            <div class="muted" id="save-result">保存后会出现在节点更新页的配置模板列表中。</div>
            <table style="margin-top:16px">
                <thead>
                    <tr>
                        <th>模板</th>
                        <th>版本</th>
                        <th>备注</th>
                    </tr>
                </thead>
                <tbody id="config-templates">
                    <tr><td colspan="3">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadVersions() {
        const response = await fetch("/api/versions");
        const data = await response.json();
        const binaries = data.binary_versions || [];
        const templates = data.config_templates || [];

        document.getElementById("binary-versions").innerHTML = binaries.length
            ? binaries.map(item => `
                <tr>
                    <td>${item.version}</td>
                    <td>${item.os}/${item.arch}</td>
                    <td>${item.filename}</td>
                </tr>
            `).join("")
            : '<tr><td colspan="3">暂无版本</td></tr>';

        document.getElementById("config-templates").innerHTML = templates.length
            ? templates.map(item => `
                <tr>
                    <td>${item.name}</td>
                    <td>${item.version}</td>
                    <td>${item.notes || "-"}</td>
                </tr>
            `).join("")
            : '<tr><td colspan="3">暂无配置模板</td></tr>';
    }

    document.getElementById("save-template").addEventListener("click", async () => {
        const payload = {
            name: document.getElementById("template-name").value.trim(),
            version: document.getElementById("template-version").value.trim(),
            notes: document.getElementById("template-notes").value.trim(),
            content: document.getElementById("template-content").value
        };

        const result = document.getElementById("save-result");
        result.textContent = "保存中...";

        const response = await fetch("/api/config-templates", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        const body = await response.json();
        if (!response.ok) {
            result.textContent = body.detail || "保存失败";
            return;
        }

        result.textContent = `已保存模板: ${body.name} (${body.version})`;
        document.getElementById("template-content").value = "";
        await loadVersions();
    });

    loadVersions();
</script>
</body>
</html>
